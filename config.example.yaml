# Remedy Server — engine configuration template.
#
# Copy to config.yaml (gitignored) and customize, or use only .env.
# Env vars override YAML; YAML overrides dataclass defaults.

api:
  # Ollama Cloud is the active deployment provider.
  llm_backend: "ollama"

  # --- Ollama Cloud (or local Ollama-compatible /v1 endpoint) ---
  api_key: ""                          # OLLAMA_API_KEY; required for cloud
  base_url: "https://ollama.com/v1"
  vision_model: "kimi-k2.7-code:cloud"
  text_model: "kimi-k2.7-code:cloud"
  cluster_nodes: []                    # additional Ollama nodes
  vision_base_url: ""                  # e.g. "http://localhost:11434" for local vision
  vision_cluster_nodes: []

  # --- Tier 2 escalation ---
  escalation_backend: "ollama"
  escalation_base_url: ""
  escalation_model: "kimi-k2.7-code:cloud"

  # --- Quality layer model separation ---
  # Must not share a model family with text_model, vision_model, or escalation_model.
  quality_judge_backend: "ollama"
  quality_judge_base_url: ""
  quality_judge_model: "mistral-large-3:675b"
  # Behavioral proxy answerers should also differ from the artifact generator.
  behavioral_test_backend: "ollama"
  behavioral_test_model: "gemma4:31b-cloud"
  behavioral_test_cache_path: ""       # optional JSON cache keyed by document hash

  # --- LiteParse (optional local triage) ---
  liteparse_enabled: false
  liteparse_bin: "lit"
  liteparse_timeout_seconds: 30.0
  liteparse_sample_pages: 3
  liteparse_text_rich_min_chars: 800
  liteparse_sparse_max_chars: 200

  # --- Concurrency ---
  max_concurrent_calls: 5
  max_retries: 3
  retry_backoff_base: 2.0
  ollama_stream: false
  ollama_reasoning_effort: "none"

output:
  output_dir: "./output"
  log_dir: "./logs"

pdf_remediation:
  enabled: true
  verapdf_path: "/usr/local/bin/verapdf"
  use_programmatic_fixes: true

  # Ghostscript (off by default; requires `gs` binary)
  ghostscript_enabled: false
  ghostscript_path: ""                 # auto-detected via shutil.which("gs") if empty
  redistill_visual_tolerance: 0.05

  # Tier 3 vision-planner fallback
  vision_planner_as_fallback: false

  # Mode B residual font repair
  font_mode_b_enabled: false
  font_mode_b_trigger_rules:
    - "7.21.4.1-1"
    - "7.21.4.2-2"
    - "7.21.7-1"
  font_mode_b_use_checker_signals: true

  # Simple-font replacement track
  simple_font_replacement_enabled: false
  simple_font_replacement_trigger_rules:
    - "7.21.4.1-1"
  simple_font_encoding_repair_enabled: false

  # Mode A faithful-rebuild
  font_mode_a_enabled: false
  font_mode_a_trigger_rules:
    - "7.1-1"
    - "7.1-2"
    - "7.1-3"
    - "7.2-11"
    - "7.2-14"
    - "7.2-42"
    - "7.2-43"
  font_mode_a_visual_diff_threshold: 0.10

contrast:
  enabled: true
  level: "AA"                          # "AA" or "AAA"
  max_iterations: 3
  dpi: 150
  auto_fix: true
